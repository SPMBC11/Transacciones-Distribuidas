<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Transferencias Interbancarias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .btn-nacional {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-internacional {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-consultar {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }

        .result.info {
            background: #d1ecf1;
            border: 2px solid #17a2b8;
            color: #0c5460;
        }

        .result h3 {
            margin-bottom: 10px;
        }

        .result-details {
            margin-top: 10px;
            font-size: 14px;
        }

        .result-details p {
            margin: 5px 0;
        }

        .cuenta-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-item strong {
            display: block;
            color: #667eea;
            margin-bottom: 5px;
        }

        .movimientos-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .movimiento-item {
            background: #f8f9fa;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .movimiento-item.debito {
            border-left-color: #dc3545;
        }

        .movimiento-item.credito {
            border-left-color: #28a745;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Sistema de Transferencias Interbancarias</h1>

        <div class="cards">
            <!-- Tarjeta de Transferencias -->
            <div class="card">
                <h2>💸 Realizar Transferencia</h2>
                <form id="transferenciaForm">
                    <div class="form-group">
                        <label for="cuentaOrigen">Cuenta Origen:</label>
                        <select id="cuentaOrigen" required>
                            <option value="">Seleccione una cuenta</option>
                            <optgroup label="Banco Nacional (PostgreSQL)">
                                <option value="BN-001">BN-001 - Juan Pérez</option>
                                <option value="BN-002">BN-002 - María García</option>
                                <option value="BN-003">BN-003 - Carlos Rodríguez</option>
                                <option value="BN-004">BN-004 - Ana Martínez</option>
                            </optgroup>
                            <optgroup label="Banco Internacional (MySQL)">
                                <option value="BI-001">BI-001 - Laura Sánchez</option>
                                <option value="BI-002">BI-002 - Pedro López</option>
                                <option value="BI-003">BI-003 - Sofia Hernández</option>
                                <option value="BI-004">BI-004 - Diego Torres</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="cuentaDestino">Cuenta Destino:</label>
                        <select id="cuentaDestino" required>
                            <option value="">Seleccione una cuenta</option>
                            <optgroup label="Banco Nacional (PostgreSQL)">
                                <option value="BN-001">BN-001 - Juan Pérez</option>
                                <option value="BN-002">BN-002 - María García</option>
                                <option value="BN-003">BN-003 - Carlos Rodríguez</option>
                                <option value="BN-004">BN-004 - Ana Martínez</option>
                            </optgroup>
                            <optgroup label="Banco Internacional (MySQL)">
                                <option value="BI-001">BI-001 - Laura Sánchez</option>
                                <option value="BI-002">BI-002 - Pedro López</option>
                                <option value="BI-003">BI-003 - Sofia Hernández</option>
                                <option value="BI-004">BI-004 - Diego Torres</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="monto">Monto:</label>
                        <input type="number" id="monto" step="0.01" min="0.01" placeholder="Ej: 1000.00" required>
                    </div>

                    <button type="submit" class="btn-nacional">Realizar Transferencia</button>
                </form>

                <div id="transferenciaResult" class="result"></div>
            </div>

            <!-- Tarjeta de Consultas -->
            <div class="card">
                <h2>🔍 Consultar Cuenta</h2>
                <div class="form-group">
                    <label for="cuentaConsulta">Seleccionar Cuenta:</label>
                    <select id="cuentaConsulta">
                        <option value="">Seleccione una cuenta</option>
                        <optgroup label="Banco Nacional (PostgreSQL)">
                            <option value="BN-001">BN-001 - Juan Pérez</option>
                            <option value="BN-002">BN-002 - María García</option>
                            <option value="BN-003">BN-003 - Carlos Rodríguez</option>
                            <option value="BN-004">BN-004 - Ana Martínez</option>
                        </optgroup>
                        <optgroup label="Banco Internacional (MySQL)">
                            <option value="BI-001">BI-001 - Laura Sánchez</option>
                            <option value="BI-002">BI-002 - Pedro López</option>
                            <option value="BI-003">BI-003 - Sofia Hernández</option>
                            <option value="BI-004">BI-004 - Diego Torres</option>
                        </optgroup>
                    </select>
                </div>

                <div class="button-group">
                    <button onclick="consultarCuenta()" class="btn-consultar">Ver Información</button>
                    <button onclick="consultarMovimientos()" class="btn-consultar">Ver Movimientos</button>
                </div>

                <div id="consultaResult" class="result"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';

        // Manejar envío del formulario de transferencia
        document.getElementById('transferenciaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const cuentaOrigen = document.getElementById('cuentaOrigen').value;
            const cuentaDestino = document.getElementById('cuentaDestino').value;
            const monto = parseFloat(document.getElementById('monto').value);

            if (cuentaOrigen === cuentaDestino) {
                mostrarResultado('transferenciaResult', 'error', 
                    'Error', 'No puedes transferir a la misma cuenta');
                return;
            }

            // Determinar el tipo de transferencia
            const esOrigenNacional = cuentaOrigen.startsWith('BN-');
            const esDestinoNacional = cuentaDestino.startsWith('BN-');

            if (esOrigenNacional === esDestinoNacional) {
                mostrarResultado('transferenciaResult', 'error', 
                    'Error', 'Solo se permiten transferencias entre diferentes bancos');
                return;
            }

            const endpoint = esOrigenNacional 
                ? `${API_BASE}/transferencias/nacional-a-internacional`
                : `${API_BASE}/transferencias/internacional-a-nacional`;

            try {
                mostrarCargando('transferenciaResult');
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cuentaOrigen, cuentaDestino, monto })
                });

                const data = await response.json();

                if (data.estado === 'EXITOSA') {
                    const detalles = `
                        <p><strong>Referencia:</strong> ${data.referencia}</p>
                        <p><strong>De:</strong> ${data.cuentaOrigen} → <strong>Para:</strong> ${data.cuentaDestino}</p>
                        <p><strong>Monto:</strong> $${data.monto.toFixed(2)}</p>
                        <p><strong>Nuevo saldo origen:</strong> $${data.saldoOrigenResultante.toFixed(2)}</p>
                        <p><strong>Nuevo saldo destino:</strong> $${data.saldoDestinoResultante.toFixed(2)}</p>
                    `;
                    mostrarResultado('transferenciaResult', 'success', '✅ Transferencia Exitosa', detalles);
                    
                    // Limpiar formulario
                    document.getElementById('transferenciaForm').reset();
                } else {
                    mostrarResultado('transferenciaResult', 'error', 
                        '❌ Transferencia Fallida', `<p>${data.mensaje}</p>`);
                }
            } catch (error) {
                mostrarResultado('transferenciaResult', 'error', 
                    'Error de Conexión', `<p>No se pudo conectar con el servidor: ${error.message}</p>`);
            }
        });

        async function consultarCuenta() {
            const cuenta = document.getElementById('cuentaConsulta').value;
            if (!cuenta) {
                mostrarResultado('consultaResult', 'error', 'Error', '<p>Seleccione una cuenta</p>');
                return;
            }

            const banco = cuenta.startsWith('BN-') ? 'nacional' : 'internacional';
            
            try {
                mostrarCargando('consultaResult');
                
                const response = await fetch(`${API_BASE}/cuentas/${banco}/${cuenta}`);
                const data = await response.json();

                if (response.ok) {
                    const detalles = `
                        <div class="cuenta-info">
                            <div class="info-item">
                                <strong>Número de Cuenta</strong>
                                ${data.numeroCuenta}
                            </div>
                            <div class="info-item">
                                <strong>Titular</strong>
                                ${data.titular}
                            </div>
                            <div class="info-item">
                                <strong>Saldo</strong>
                                $${data.saldo.toFixed(2)}
                            </div>
                            <div class="info-item">
                                <strong>Estado</strong>
                                ${data.activa ? '✅ Activa' : '❌ Inactiva'}
                            </div>
                            <div class="info-item">
                                <strong>Banco</strong>
                                ${data.banco}
                            </div>
                        </div>
                    `;
                    mostrarResultado('consultaResult', 'info', '📋 Información de Cuenta', detalles);
                } else {
                    mostrarResultado('consultaResult', 'error', 'Error', `<p>${data.message || 'Cuenta no encontrada'}</p>`);
                }
            } catch (error) {
                mostrarResultado('consultaResult', 'error', 'Error de Conexión', `<p>${error.message}</p>`);
            }
        }

        async function consultarMovimientos() {
            const cuenta = document.getElementById('cuentaConsulta').value;
            if (!cuenta) {
                mostrarResultado('consultaResult', 'error', 'Error', '<p>Seleccione una cuenta</p>');
                return;
            }

            const banco = cuenta.startsWith('BN-') ? 'nacional' : 'internacional';
            
            try {
                mostrarCargando('consultaResult');
                
                const response = await fetch(`${API_BASE}/cuentas/${banco}/${cuenta}/movimientos`);
                const movimientos = await response.json();

                if (response.ok) {
                    let detalles = '<div class="movimientos-list">';
                    
                    if (movimientos.length === 0) {
                        detalles += '<p>No hay movimientos registrados</p>';
                    } else {
                        movimientos.forEach(m => {
                            const clase = m.tipo === 'DEBITO' ? 'debito' : 'credito';
                            const icono = m.tipo === 'DEBITO' ? '↓' : '↑';
                            detalles += `
                                <div class="movimiento-item ${clase}">
                                    <strong>${icono} ${m.tipo}</strong> - $${m.monto.toFixed(2)}<br>
                                    <small>${m.descripcion}</small><br>
                                    <small>Saldo: $${m.saldoAnterior.toFixed(2)} → $${m.saldoNuevo.toFixed(2)}</small><br>
                                    <small>Ref: ${m.referenciaTransferencia || 'N/A'}</small>
                                </div>
                            `;
                        });
                    }
                    
                    detalles += '</div>';
                    mostrarResultado('consultaResult', 'info', '📊 Historial de Movimientos', detalles);
                } else {
                    mostrarResultado('consultaResult', 'error', 'Error', '<p>No se pudieron obtener los movimientos</p>');
                }
            } catch (error) {
                mostrarResultado('consultaResult', 'error', 'Error de Conexión', `<p>${error.message}</p>`);
            }
        }

        function mostrarResultado(elementId, tipo, titulo, contenido) {
            const element = document.getElementById(elementId);
            element.className = `result ${tipo}`;
            element.innerHTML = `<h3>${titulo}</h3><div class="result-details">${contenido}</div>`;
            element.style.display = 'block';
        }

        function mostrarCargando(elementId) {
            const element = document.getElementById(elementId);
            element.className = 'result info';
            element.innerHTML = '<div class="loading"><div class="spinner"></div><p>Procesando...</p></div>';
            element.style.display = 'block';
        }
    </script>
</body>
</html>
